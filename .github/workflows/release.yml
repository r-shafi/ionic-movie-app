name: Build & Release APK

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.2.3)"
        required: true

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Enable corepack / pnpm
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web assets (production)
        run: pnpm exec ng build --configuration production

      - name: Sync Capacitor Android platform
        run: pnpm exec cap sync android

      - name: Bump versionCode
        run: node scripts/bump-version-code.js

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Build signed APK
        working-directory: android
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/android/app/release.keystore" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Rename APK with version tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          cp android/app/build/outputs/apk/release/app-release.apk \
             "open-movie-tracker-${TAG}.apk"
          echo "apk_name=open-movie-tracker-${TAG}.apk" >> "$GITHUB_ENV"

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: ${{ env.apk_name }}
          generate_release_notes: false

      - name: Generate F-Droid changelog
        run: |
          VERSION_CODE=$(grep -oP 'versionCode\s+\K\d+' android/app/build.gradle)
          echo "ANDROID_VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          mkdir -p fastlane/metadata/android/en-US/changelogs
          awk 'f{if(/^## /) exit; print} /^## /{f=1; print; next}' CHANGELOG.md \
            | head -20 \
            > "fastlane/metadata/android/en-US/changelogs/${VERSION_CODE}.txt"
          echo "Wrote F-Droid changelog for versionCode $VERSION_CODE"

      - name: Persist Android version metadata to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git pull --ff-only origin main

          current_main_code=$(grep -oP 'versionCode\s+\K\d+' android/app/build.gradle)
          target_code="${ANDROID_VERSION_CODE}"

          if [[ "$target_code" -le "$current_main_code" ]]; then
            echo "Skipping metadata persist: target versionCode $target_code <= main versionCode $current_main_code"
            exit 0
          fi

          sed -i -E "s/versionCode[[:space:]]+[0-9]+/versionCode ${target_code}/" android/app/build.gradle
          node scripts/bump-version-code.js --sync-only

          mkdir -p fastlane/metadata/android/en-US/changelogs
          awk 'f{if(/^## /) exit; print} /^## /{f=1; print; next}' CHANGELOG.md \
            | head -20 \
            > "fastlane/metadata/android/en-US/changelogs/${target_code}.txt"

          git add android/app/build.gradle fastlane/metadata/android/en-US/changelogs/
          git diff --staged --quiet || git commit -m "chore: sync android version metadata for ${{ github.event.inputs.tag || github.ref_name }}"
          git push origin HEAD:main

      - name: Clean up keystore
        if: always()
        run: rm -f android/app/release.keystore
