name: Build & Release APK

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.2.3)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Enable corepack / pnpm
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web assets (production)
        run: pnpm exec ng build --configuration production

      - name: Sync Capacitor Android platform
        run: pnpm exec cap sync android

      - name: Bump versionCode
        run: node scripts/bump-version-code.js

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Build signed APK
        working-directory: android
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/android/app/release.keystore" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Rename APK with version tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          cp android/app/build/outputs/apk/release/app-release.apk \
             "open-movie-tracker-${TAG}.apk"

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: open-movie-tracker-${{ github.event.inputs.tag || github.ref_name }}.apk
          generate_release_notes: false

      - name: Generate F-Droid changelog
        run: |
          VERSION_CODE=$(grep -oP 'versionCode\s+\K\d+' android/app/build.gradle)
          mkdir -p fastlane/metadata/android/en-US/changelogs
            | head -20 \
            > "fastlane/metadata/android/en-US/changelogs/${VERSION_CODE}.txt"
          echo "Wrote F-Droid changelog for versionCode $VERSION_CODE"

      - name: Commit F-Droid changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fastlane/metadata/android/en-US/changelogs/
          git diff --staged --quiet || git commit -m "chore: add F-Droid changelog for ${{ github.event.inputs.tag || github.ref_name }}"
          git push origin HEAD:main

      - name: Clean up keystore
        if: always()
        run: rm -f android/app/release.keystore
