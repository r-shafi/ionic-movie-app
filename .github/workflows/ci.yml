name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Enable corepack / pnpm
        run: corepack enable pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build (production smoke test)
        run: pnpm exec ng build --configuration production

      - name: Check android/app/build.gradle versionCode is integer
        run: |
          code=$(grep -oP 'versionCode\s+\K\d+' android/app/build.gradle)
          echo "versionCode: $code"
          [[ "$code" =~ ^[0-9]+$ ]] || (echo "::error::versionCode is not a plain integer" && exit 1)

      - name: Sync android versionName with package.json
        run: |
          node scripts/bump-version-code.js --sync-only
          if ! git diff --quiet -- android/app/build.gradle; then
            echo "::warning::android/app/build.gradle was out of sync with package.json and was auto-corrected in CI"
          fi
          android_version=$(grep -oP 'versionName\s+"\K[^"]+' android/app/build.gradle)
          echo "android versionName after sync: $android_version"

      - name: Validate PR title (conventional commits)
        if: github.event_name == 'pull_request'
        run: |
          echo "${{ github.event.pull_request.title }}" | \
          pnpm exec commitlint --config commitlint.config.js
