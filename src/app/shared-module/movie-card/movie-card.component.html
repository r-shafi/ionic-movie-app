<div class="flex items-center justify-center">
  <div class="relative">
    <ion-img
      class="h-[200px] aspect-[9/16]"
      src="{{
        movie.poster_path
          ? 'https://image.tmdb.org/t/p/w185' + movie.poster_path
          : 'assets/no-image.png'
      }}"
      (click)="handleNavigate($event)"
      (touchstart)="onTouchStart()"
      (touchend)="onTouchEnd()"
      (touchcancel)="onTouchEnd()"
      (touchmove)="onTouchEnd()"
    ></ion-img>
    @if (shouldFade) {
      <div class="absolute inset-0 bg-black/40 pointer-events-none"></div>
      <div class="absolute right-1 top-1 rounded-full bg-black/70 px-1.5 py-0.5 text-[0.6rem] font-bold text-white pointer-events-none">
        ✓
      </div>
    }
  </div>
  <section class="details ion-padding-start">
    <h1
      class="ion-no-margin cursor-pointer text-[clamp(24px,2.5vw,44px)]"
      (click)="handleNavigate($event)"
    >
      {{ movie.title || movie.name }}
    </h1>
    <p class="my-[0.2rem] opacity-70">
      {{ movie.release_date || movie.first_air_date | date }}
    </p>
    <p class="ion-no-margin">
      {{ movie.vote_average }}
      <ion-icon name="star" class="mb-[-0.1rem]"></ion-icon>
    </p>
    <section>
      <ion-button
        fill="outline"
        title="Add to Watched Movies"
        (click)="addToWatchedMovies()"
        color="{{ isWatched ? 'danger' : 'medium' }}"
      >
        <ion-icon
          name="{{ isWatched ? 'add-circle' : 'add-circle-outline' }}"
        ></ion-icon>
      </ion-button>
      <ion-button
        fill="outline"
        title="Add to Favorites"
        (click)="addToFavoriteMovies()"
        color="{{ isFavorite ? 'danger' : 'medium' }}"
      >
        <ion-icon
          name="{{ isFavorite ? 'heart' : 'heart-outline' }}"
        ></ion-icon>
      </ion-button>
      <ion-button
        fill="outline"
        title="Add to Watchlist"
        (click)="addToWatchlist()"
        color="{{ isWatchlist ? 'danger' : 'medium' }}"
      >
        <ion-icon
          name="{{ isWatchlist ? 'bookmark' : 'bookmark-outline' }}"
        ></ion-icon>
      </ion-button>
    </section>
  </section>
</div>
