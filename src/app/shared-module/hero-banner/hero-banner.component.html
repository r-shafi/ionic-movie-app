@if (!isLoading && current) {
  <div class="relative w-full cursor-pointer" (click)="navigate()">
    <div
      class="relative h-[56vw] max-h-[420px] min-h-60 w-full overflow-hidden bg-[#111] bg-cover bg-center bg-no-repeat"
      [style.backgroundImage]="
        backdropUrl ? 'url(' + backdropUrl + ')' : 'none'
      "
    >
      <div
        class="absolute inset-0 bg-gradient-to-b from-black/10 via-black/50 to-black/90"
      ></div>
      <div class="absolute inset-x-0 bottom-0 p-4">
        <span
          class="mb-1.5 inline-block text-[0.7rem] font-bold uppercase tracking-[0.08em]"
          style="color: var(--ion-color-primary)"
          >{{ current.media_type === "tv" ? "TV Series" : "Movie" }}</span
        >
        <h1
          class="m-0 mb-1 text-[clamp(1.3rem,5vw,2rem)] font-extrabold leading-[1.2] text-white [text-shadow:0_2px_8px_rgba(0,0,0,0.6)]"
        >
          {{ current.title || current.name }}
        </h1>
        <p class="m-0 mb-2.5 text-[0.85rem] text-white/80">
          {{ getYear(current) }}
          @if (current.vote_average) {
            <span>
              &nbsp;·&nbsp;⭐ {{ current.vote_average | number: "1.1-1" }}
            </span>
          }
        </p>
      </div>
    </div>
  </div>
}

<!-- Skeleton -->
@if (isLoading) {
  <div class="relative w-full cursor-pointer">
    <div
      class="relative h-[56vw] max-h-[420px] min-h-60 w-full overflow-hidden bg-cover bg-center bg-no-repeat"
      style="background: var(--ion-color-step-50, #1a1a1a)"
    >
      <div
        class="absolute inset-0 bg-gradient-to-b from-black/10 via-black/50 to-black/90"
      ></div>
      <div class="absolute inset-x-0 bottom-0 p-4">
        <ion-skeleton-text
          animated
          class="mb-2 h-5 w-[60px]"
        ></ion-skeleton-text>
        <ion-skeleton-text
          animated
          class="mb-1.5 h-7 w-[70%]"
        ></ion-skeleton-text>
        <ion-skeleton-text
          animated
          class="mb-3 h-4 w-[40%]"
        ></ion-skeleton-text>
        <div class="flex gap-2">
          <ion-skeleton-text
            animated
            class="h-8 w-[90px] rounded-lg"
          ></ion-skeleton-text>
          <ion-skeleton-text
            animated
            class="h-8 w-[90px] rounded-lg"
          ></ion-skeleton-text>
          <ion-skeleton-text
            animated
            class="h-8 w-[90px] rounded-lg"
          ></ion-skeleton-text>
        </div>
      </div>
    </div>
  </div>
}
