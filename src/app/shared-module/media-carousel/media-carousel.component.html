@if (isLoading || items?.length) {
  <div class="pb-2">
    <div class="flex items-center justify-between px-4 pb-2 pt-4">
      <h2 class="m-0 text-base font-bold" style="color: var(--ion-text-color)">{{ title }}</h2>
      @if (!isLoading && seeAllRoute) {
        <a
          class="text-[0.8rem] font-semibold no-underline"
          style="color: var(--ion-color-primary)"
          [routerLink]="seeAllRoute"
          [queryParams]="seeAllQueryParams"
          >See All</a
          >
        }
      </div>
      <!-- Loaded -->
      @if (!isLoading) {
        <div class="flex snap-x gap-2.5 overflow-x-auto px-4 pb-2 [-webkit-overflow-scrolling:touch] [scroll-padding-left:16px] [scrollbar-width:none] [&::-webkit-scrollbar]:hidden">
          @for (item of items; track item) {
            <app-poster-card
              class="w-[clamp(104px,28vw,150px)] shrink-0 snap-start"
              [item]="item"
              [mediaType]="mediaType"
              >
            </app-poster-card>
          }
        </div>
      }
      <!-- Skeleton -->
      @if (isLoading) {
        <div class="flex snap-x gap-2.5 overflow-x-auto px-4 pb-2 [-webkit-overflow-scrolling:touch] [scroll-padding-left:16px] [scrollbar-width:none] [&::-webkit-scrollbar]:hidden">
          @for (s of skeletons; track s) {
            <app-skeleton-card class="w-[clamp(104px,28vw,150px)] shrink-0 snap-start"></app-skeleton-card>
          }
        </div>
      }
    </div>
  }
