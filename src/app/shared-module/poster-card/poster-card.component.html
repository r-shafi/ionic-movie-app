<div
  class="w-full cursor-pointer"
  (click)="handleClick($event)"
  (touchstart)="onTouchStart()"
  (touchend)="onTouchEnd()"
  (touchcancel)="onTouchEnd()"
  (touchmove)="onTouchEnd()"
>
  <div
    class="relative aspect-[2/3] w-full overflow-hidden rounded-lg"
    style="background: var(--ion-color-step-100)"
  >
    <ion-img [src]="posterUrl" [alt]="title" class="h-full w-full object-cover"></ion-img>
    @if (shouldFade) {
      <div class="absolute inset-0 bg-black/40 pointer-events-none"></div>
      <div class="absolute right-1 top-1 rounded-full bg-black/70 px-1.5 py-0.5 text-[0.6rem] font-bold text-white pointer-events-none">
        ✓
      </div>
    }
    @if (item?.vote_average) {
      <span class="absolute bottom-1 left-1 rounded bg-black/75 px-[5px] py-0.5 text-[0.65rem] font-bold text-white">
        ⭐ {{ item.vote_average | number: "1.1-1" }}
      </span>
    }
    @if (userRating) {
      <span class="absolute right-1 top-1 rounded px-[5px] py-0.5 text-[0.65rem] font-bold text-white" style="background: var(--ion-color-primary)">
        ★{{ userRating }}
      </span>
    }
  </div>
  <p class="my-0 mb-0.5 mt-[5px] truncate text-[0.78rem] font-semibold" style="color: var(--ion-text-color)">{{ title }}</p>
  <p class="m-0 text-[0.7rem]" style="color: var(--ion-color-medium)">{{ year }}</p>
</div>
