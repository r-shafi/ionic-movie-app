<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start"><ion-back-button></ion-back-button></ion-buttons>
    <ion-title>Ratings</ion-title>
  </ion-toolbar>
  <ion-toolbar>
    <ion-segment
      [value]="activeTab"
      (ionChange)="activeTab = $any($event.detail.value)"
    >
      <ion-segment-button value="all">All</ion-segment-button>
      <ion-segment-button value="movie">Movies</ion-segment-button>
      <ion-segment-button value="tv">TV</ion-segment-button>
    </ion-segment>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="px-4 pt-3 pb-5">
    <ion-segment
      [value]="sortBy"
      (ionChange)="sortBy = $any($event.detail.value)"
      class="mb-3"
    >
      <ion-segment-button value="highest">Highest</ion-segment-button>
      <ion-segment-button value="lowest">Lowest</ion-segment-button>
      <ion-segment-button value="recent">Recent</ion-segment-button>
    </ion-segment>

    @if (ratedEntries.length) {
    <div class="grid grid-cols-2 gap-3">
      @for (entry of ratedEntries; track entry.media_type + ':' + entry.id) {
      <a
        [routerLink]="detailLink(entry)"
        class="rounded-xl border p-2 no-underline"
        style="
          border-color: var(--ion-color-step-100);
          background: var(--ion-color-step-50);
          color: var(--ion-text-color);
        "
      >
        <img
          [src]="poster(entry)"
          class="mb-2 aspect-[2/3] w-full rounded-lg object-cover"
        />
        <p class="m-0 truncate text-[0.82rem] font-bold">{{ entry.title }}</p>
        <p
          class="m-0 mt-0.5 text-[0.7rem]"
          style="color: var(--ion-color-medium)"
        >
          {{ entry.media_type === 'tv' ? 'TV Show' : 'Movie' }}
        </p>
        <span
          class="mt-1 inline-block rounded px-1.5 py-0.5 text-[0.7rem] font-bold text-white"
          style="background: var(--ion-color-primary)"
        >
          ★{{ entry.rating }}
        </span>
      </a>
      }
    </div>
    } @else {
    <div
      class="ion-padding ion-text-center rounded-xl"
      style="background: var(--ion-color-step-50)"
    >
      <ion-icon
        name="star-outline"
        style="font-size: 3rem; color: var(--ion-color-medium)"
      ></ion-icon>
      <p class="mb-0">No ratings yet.</p>
    </div>
    }
  </div>
</ion-content>
