<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start"><ion-back-button></ion-back-button></ion-buttons>
    <ion-title>Reviews</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="px-4 pt-3 pb-5">
    <ion-searchbar
      [(ngModel)]="searchTerm"
      placeholder="Search reviews"
      animated="true"
      class="mb-3"
    ></ion-searchbar>

    @if (reviewEntries.length) { @for (entry of reviewEntries; track
    entry.media_type + ':' + entry.id) {
    <a
      [routerLink]="detailLink(entry)"
      class="mb-3 flex gap-3 rounded-xl border p-2 no-underline"
      style="
        border-color: var(--ion-color-step-100);
        background: var(--ion-color-step-50);
        color: var(--ion-text-color);
      "
    >
      <img
        [src]="poster(entry)"
        class="h-[88px] w-[58px] shrink-0 rounded object-cover"
      />
      <div class="min-w-0 flex-1">
        <p class="m-0 truncate text-[0.85rem] font-bold">{{ entry.title }}</p>
        <p
          class="m-0 mt-0.5 text-[0.7rem]"
          style="color: var(--ion-color-medium)"
        >
          {{ watchDate(entry) }} @if (entry.rating !== null) {
          <span> · ★{{ entry.rating }}</span>
          }
        </p>
        <p
          class="m-0 mt-1 line-clamp-3 text-[0.75rem]"
          style="color: var(--ion-color-step-650)"
        >
          {{ entry.review }}
        </p>
      </div>
    </a>
    } } @else {
    <div
      class="ion-padding ion-text-center rounded-xl"
      style="background: var(--ion-color-step-50)"
    >
      <ion-icon
        name="chatbubble-ellipses-outline"
        style="font-size: 3rem; color: var(--ion-color-medium)"
      ></ion-icon>
      <p class="mb-0">No reviews yet.</p>
    </div>
    }
  </div>
</ion-content>
