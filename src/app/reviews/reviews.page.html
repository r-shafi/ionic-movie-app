<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button></ion-back-button>
    </ion-buttons>
    <ion-title>Reviews</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-searchbar
    placeholder="Search reviews…"
    [value]="searchQuery"
    (ionInput)="onSearch($event)"
    class="reviews-search"
  ></ion-searchbar>

  <div class="sort-bar">
    <button
      class="sort-pill"
      [class.sort-pill--active]="sortBy === 'newest'"
      (click)="onSortChange('newest')"
    >
      Newest
    </button>
    <button
      class="sort-pill"
      [class.sort-pill--active]="sortBy === 'oldest'"
      (click)="onSortChange('oldest')"
    >
      Oldest
    </button>
    <button
      class="sort-pill"
      [class.sort-pill--active]="sortBy === 'highest'"
      (click)="onSortChange('highest')"
    >
      Highest Rated
    </button>
    <button
      class="sort-pill"
      [class.sort-pill--active]="sortBy === 'lowest'"
      (click)="onSortChange('lowest')"
    >
      Lowest Rated
    </button>
  </div>

  <!-- Loading -->
  <ng-container *ngIf="isLoading">
    <div class="review-card" *ngFor="let s of [0,1,2,3,4]">
      <ion-skeleton-text
        animated
        style="width: 100%; height: 90px; border-radius: 8px; margin: 0"
      ></ion-skeleton-text>
    </div>
  </ng-container>

  <!-- Results -->
  <ng-container *ngIf="!isLoading">
    <div class="review-card" *ngFor="let review of filteredReviews">
      <div class="review-header">
        <div class="review-avatar">
          <img
            [src]="getAvatarUrl(review)"
            [alt]="review.author"
            class="review-avatar__img"
          />
        </div>
        <div class="review-author-meta">
          <span class="review-author">{{ review.author }}</span>
          <span class="review-rating" *ngIf="review.author_details?.rating">
            ⭐ {{ review.author_details.rating }}/10
          </span>
        </div>
        <span class="review-date"
          >{{ review.created_at | date:'mediumDate' }}</span
        >
      </div>
      <p class="review-content">{{ review.content }}</p>
    </div>

    <div
      class="empty-state ion-padding ion-text-center"
      *ngIf="!filteredReviews.length"
    >
      <ion-icon
        name="chatbubble-outline"
        style="font-size: 3rem; color: var(--ion-color-medium)"
      ></ion-icon>
      <p>No reviews found.</p>
    </div>
  </ng-container>
</ion-content>
